services:
  # The Laravel Web Service
  - type: web
    name: tc-service-center
    env: docker
    plan: free
    region: oregon 
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: "Thambu Computers"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: "https://app.thambucomputers.com"
      - key: APP_BASE_DOMAIN
        value: "thambucomputers.com"
      - key: SESSION_DOMAIN
        value: ".thambucomputers.com"
      - key: SANCTUM_STATEFUL_DOMAINS
        value: "app.thambucomputers.com,thambucomputers.com"
      - key: APP_KEY
        value: "base64:B9lc7FOvpMn/jisyUXz8jiX7SvNqiKlcx5B7wFV7tm0="
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: cookie
      - key: SESSION_SECURE_COOKIE
        value: true
      - key: SESSION_LIFETIME
        value: 120
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: tc-database
          property: host
      - key: DB_PORT
        fromDatabase:
          name: tc-database
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: tc-database
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: tc-database
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: tc-database
          property: password

databases:
  # The PostgreSQL Database
  - name: tc-database
    plan: free
    region: oregon
