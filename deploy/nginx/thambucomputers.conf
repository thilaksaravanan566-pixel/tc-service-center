##############################################################
# Nginx Configuration — thambucomputers.com
# File: /etc/nginx/sites-available/thambucomputers.conf
#
# USAGE:
#   sudo cp deploy/nginx/thambucomputers.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/thambucomputers.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# After SSL (Let's Encrypt), certbot will auto-add HTTPS blocks.
##############################################################

# ─── Redirect HTTP → HTTPS (main domain) ───────────────────
server {
    listen 80;
    server_name thambucomputers.com www.thambucomputers.com
                admin.thambucomputers.com
                dealer.thambucomputers.com
                customer.thambucomputers.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Main Domain — thambucomputers.com ─────────────────────
server {
    listen 443 ssl http2;
    server_name thambucomputers.com www.thambucomputers.com;

    root /var/www/thambucomputers/public;
    index index.php index.html;

    # SSL (certbot fills these in automatically)
    ssl_certificate     /etc/letsencrypt/live/thambucomputers.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thambucomputers.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Laravel routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # PHP processing
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Deny .env and hidden files
    location ~ /\. {
        deny all;
    }

    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }

    # File upload size
    client_max_body_size 20M;
}

# ─── Admin Subdomain — admin.thambucomputers.com ──────────
server {
    listen 443 ssl http2;
    server_name admin.thambucomputers.com;

    root /var/www/thambucomputers/public;
    index index.php;

    ssl_certificate     /etc/letsencrypt/live/thambucomputers.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thambucomputers.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    location ~ /\. { deny all; }
    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}

